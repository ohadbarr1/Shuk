<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#06060b"/>
  <!-- Subtle grid dots -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gradient glow -->
  <ellipse cx="400" cy="250" rx="400" ry="250" fill="rgba(96,165,250,0.06)"/>
  <ellipse cx="800" cy="400" rx="300" ry="200" fill="rgba(168,85,247,0.05)"/>
  <!-- Logo circle -->
  <circle cx="600" cy="240" r="70" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#fbbf24">&#x20AA;</text>
  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#f0f0f8">חשבשבון</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a0a0be">סימולטור החלטות פיננסיות</text>
  <!-- Feature chips -->
  <rect x="200" y="470" width="140" height="36" rx="18" fill="rgba(96,165,250,0.15)"/>
  <text x="270" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#60a5fa">משכנתא</text>
  <rect x="370" y="470" width="120" height="36" rx="18" fill="rgba(52,211,153,0.15)"/>
  <text x="430" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34d399">שכר נטו</text>
  <rect x="520" y="470" width="160" height="36" rx="18" fill="rgba(167,139,250,0.15)"/>
  <text x="600" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a78bfa">שכירות/קנייה</text>
  <rect x="710" y="470" width="120" height="36" rx="18" fill="rgba(251,191,36,0.15)"/>
  <text x="770" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24">פנסיה</text>
  <!-- Badge -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#606080">נתוני 2026 | חינם | בלי הרשמה</text>
</svg>
